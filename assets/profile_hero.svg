<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Dr. Muhammad Shoaib profile hero</title>
  <desc id="desc">A profile banner for applied AI, quantitative modelling, energy systems, and decision intelligence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.45" stop-color="#12314f"/>
      <stop offset="1" stop-color="#0b5f68"/>
    </linearGradient>
    <radialGradient id="pulse" cx="74%" cy="42%" r="58%">
      <stop offset="0" stop-color="#6ee7b7" stop-opacity="0.55"/>
      <stop offset="0.38" stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#08111f" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="28" fill="url(#pulse)"/>

  <g opacity="0.25">
    <path d="M68 318 C198 250, 300 370, 434 292 S704 254, 832 306 S1078 336, 1210 250" fill="none" stroke="#a7f3d0" stroke-width="2"/>
    <path d="M70 258 C200 190, 306 306, 438 230 S704 192, 836 242 S1076 270, 1214 190" fill="none" stroke="#7dd3fc" stroke-width="2"/>
    <path d="M70 198 C210 132, 318 232, 448 174 S702 130, 838 182 S1080 208, 1212 132" fill="none" stroke="#fef3c7" stroke-width="2"/>
  </g>

  <g transform="translate(76 74)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#a7f3d0" letter-spacing="2">APPLIED AI | QUANT FINANCE | ENERGY SYSTEMS | RISK</text>
    <text x="0" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="850" fill="#ffffff">Dr. Muhammad Shoaib</text>
    <text x="0" y="122" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="650" fill="#e0f2fe">I build decision systems for uncertainty-heavy domains.</text>
    <text x="0" y="164" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" fill="#cbd5e1">Forecasting, optimization, stochastic modelling, risk scoring, and client-facing AI tools.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="796" y="88" width="360" height="224" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#bae6fd" stroke-opacity="0.55"/>
    <text x="836" y="136" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#ffffff">Operating Pattern</text>
    <circle cx="850" cy="176" r="5" fill="#6ee7b7"/>
    <text x="870" y="182" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#e2e8f0">Mathematical model</text>
    <circle cx="850" cy="212" r="5" fill="#38bdf8"/>
    <text x="870" y="218" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#e2e8f0">Production-shaped Python</text>
    <circle cx="850" cy="248" r="5" fill="#fbbf24"/>
    <text x="870" y="254" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#e2e8f0">Tests, diagnostics, reports</text>
    <circle cx="850" cy="284" r="5" fill="#f472b6"/>
    <text x="870" y="290" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#e2e8f0">Human-readable product surface</text>
  </g>
</svg>
